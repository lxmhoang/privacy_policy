<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chính sách Bảo mật – Sổ Chi Tiêu Tự Động</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #2d3748;
      line-height: 1.75;
    }
    header {
      background: #10a37f;
      color: #fff;
      padding: 48px 24px 40px;
      text-align: center;
    }
    header .logo {
      width: 72px; height: 72px;
      background: #fff;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 36px;
    }
    header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }
    header p  { font-size: 0.95rem; opacity: 0.85; }

    main {
      max-width: 780px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 32px 36px;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #10a37f;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2 .icon { font-size: 1.2rem; }

    p { margin-bottom: 12px; font-size: 0.97rem; }
    p:last-child { margin-bottom: 0; }

    ul {
      margin: 8px 0 12px 20px;
      font-size: 0.97rem;
    }
    ul li { margin-bottom: 6px; }

    .highlight {
      background: #e6f7f2;
      border-left: 4px solid #10a37f;
      border-radius: 0 8px 8px 0;
      padding: 12px 16px;
      margin: 12px 0;
      font-size: 0.95rem;
    }

    .updated {
      text-align: center;
      font-size: 0.85rem;
      color: #718096;
      margin-top: 32px;
    }

    a { color: #10a37f; }

    @media (max-width: 520px) {
      .card { padding: 24px 20px; }
      header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">📒</div>
  <h1>Sổ Chi Tiêu Tự Động</h1>
  <p>Chính sách Bảo mật &amp; Quyền riêng tư</p>
</header>
